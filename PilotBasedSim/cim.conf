[CIM]
# =========================================================
# CIM METRICS INGESTION API (AUTHENTICATED)
# Base: /gd-cim-api/v1
# =========================================================
#
# IMPORTANT: Do not store credentials in this file.
# Set environment variables instead:
#   export CIM_EMAIL="your_email"
#   export CIM_PASSWORD="your_password"

API_BASE = https://greendigit-cim.sztaki.hu/gd-cim-api/v1
METRICS_URL = https://greendigit-cim.sztaki.hu/gd-cim-api/v1/submit

[KPI]
# =========================================================
# KPI HELPER API
# Base: /gd-kpi-api/v1
# =========================================================
API_BASE = https://greendigit-cim.sztaki.hu/gd-kpi-api/v1

[Defaults]
# =========================================================
# Fallback values if KPI calls fail
# =========================================================
PUE = 3
CI = 1000
ENERGY_WH = 8500

[Runtime]
# =========================================================
# Runtime behaviour
# =========================================================
TOKEN_MAX_AGE_H = 24
CACHE_TTL = 300
TOKEN_TIMEOUT_S = 20
PUE_TIMEOUT_S = 20
CI_TIMEOUT_S = 30
SUBMIT_TIMEOUT_S = 30
